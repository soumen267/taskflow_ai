{% if messages %}
<div class="tf-messages" aria-live="polite">
  {% for message in messages %}
    <div
      class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show tf-alert"
      role="alert"
    >
      {% if message.tags == 'success' %}<i class="bi bi-check-circle-fill me-2"></i>
      {% elif message.tags == 'warning' %}<i class="bi bi-exclamation-triangle-fill me-2"></i>
      {% elif message.tags == 'error' or message.tags == 'danger' %}<i class="bi bi-x-circle-fill me-2"></i>
      {% else %}<i class="bi bi-info-circle-fill me-2"></i>{% endif %}
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
  {% endfor %}
</div>
{% endif %}
