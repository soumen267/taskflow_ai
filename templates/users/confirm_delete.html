{% extends "base.html" %}

{% block title %}Delete User{% endblock %}
{% block page_title %}Delete User{% endblock %}

{% block content %}
<div class="tf-card" style="max-width:480px;">
  <div class="tf-card__body text-center py-5">
    <i class="bi bi-trash3 fs-1 text-danger mb-3 d-block"></i>
    <h2 class="h5">Delete "{{ object.name }}"?</h2>
    <p class="text-muted">This action cannot be undone.</p>
    <form method="post" class="d-flex justify-content-center gap-3 mt-4">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, delete</button>
      <a href="{% url 'users:list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
