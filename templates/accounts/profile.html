{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Profile{% endblock %}
{% block page_title %}Profile{% endblock %}

{% block content %}
<div class="tf-page-header">
  <h1 class="tf-page-header__title">Your Profile</h1>
</div>

<div class="tf-card" style="max-width:640px;">
  <div class="tf-card__body">
    <form method="post" enctype="multipart/form-data" novalidate>
      {% csrf_token %}
      {{ form|crispy }}
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn tf-btn-primary">Save changes</button>
        <a href="{% url 'core:dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
